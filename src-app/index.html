<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="no-referrer" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="description" content="Agentiz — student workspace for research and productivity." />
  <meta name="robots" content="index,follow" />
  <meta name="rating" content="general" />
  <title>Agentiz</title>
  <link rel="icon" type="image/png" href="/icon.png" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="dns-prefetch" href="https://a.luminsdk.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <!-- Tab cloaking: preserves title/favicon based on saved theme preference -->
  <script>
    (function() {
      try {
        var presets = {
          default: { t: 'Agentiz', f: '/icon.png' },
          google:  { t: 'Google',  f: 'https://www.google.com/favicon.ico' },
          gclass:  { t: 'Classes', f: 'https://ssl.gstatic.com/classroom/favicon.png' },
          canvas:  { t: 'Dashboard', f: 'https://du11hjcvx0uqb.cloudfront.net/dist/images/favicon-e10d657a73.ico' },
          clever:  { t: 'Clever | Portal', f: 'https://clever.com/favicon.ico' },
          blank:   { t: '​', f: 'data:image/svg+xml,%3Csvg xmlns%3D"http%3A//www.w3.org/2000/svg"/%3E' }
        };
        window.__agThemePresets = presets;
        var id = localStorage.getItem('agentiz_theme') || 'default';
        var p = presets[id] || presets.default;
        document.title = p.t;
        var link = document.querySelector("link[rel~='icon']");
        if (link) { link.href = p.f; }
        window.__agApplyTheme = function() {
          var id2 = localStorage.getItem('agentiz_theme') || 'default';
          var p2 = presets[id2] || presets.default;
          document.title = p2.t;
          var l = document.querySelector("link[rel~='icon']");
          if (l) l.href = p2.f;
        };
      } catch(e) {}
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <!-- BareMux setup — must run BEFORE the SW handles its first proxied
       request, which means before any iframe nav. Loaded synchronously
       so window.BareMux is defined by the time React boots. -->
  <script src="/transport/bare-mux.js"></script>
  <script>
    (function () {
      if (!('serviceWorker' in navigator)) return;
      if (!window.BareMux || !window.BareMux.BareMuxConnection) {
        console.warn('[agentiz] BareMux global missing — proxy will not work');
        return;
      }

      // Public Wisp servers, tried in order. Each one is a real wisp
      // backend (verified via WS handshake + first wisp packet).
      // If one is blocked by a network filter the page transparently
      // moves to the next.
      var WISP_CANDIDATES = [
        'wss://anura.pro/',
        'wss://wisp.terbiumon.top/wisp/',
        'wss://terbiumon.top/wisp/',
        'wss://anura.pro/wisp/',
      ];

      function probeWisp(url, timeoutMs) {
        return new Promise(function (resolve) {
          var ws, timer, done = false;
          function finish(ok) {
            if (done) return; done = true;
            try { ws && ws.close(); } catch (_) {}
            clearTimeout(timer);
            resolve(ok);
          }
          try { ws = new WebSocket(url); } catch (_) { return resolve(false); }
          ws.binaryType = 'arraybuffer';
          timer = setTimeout(function () { finish(false); }, timeoutMs);
          // Any binary frame from the server == it's actually wisp.
          ws.addEventListener('message', function (e) {
            if (e.data instanceof ArrayBuffer && e.data.byteLength > 0) finish(true);
          });
          ws.addEventListener('error', function () { finish(false); });
          ws.addEventListener('close', function () { finish(false); });
        });
      }

      function setTransport(wispUrl) {
        try {
          var conn = new window.BareMux.BareMuxConnection('/transport/bare-mux-worker.js');
          conn.setTransport('/relay/epoxy-transport.mjs', [{ wisp: wispUrl }]);
          window.__agentizWispUrl = wispUrl;
          console.info('[agentiz] wisp transport set →', wispUrl);
        } catch (err) {
          console.warn('[agentiz] setTransport failed:', err);
        }
      }

      // Optimistic first pick — set immediately so SW has a transport
      // even if probing is slow. Then probe and re-set if needed.
      setTransport(WISP_CANDIDATES[0]);

      (async function () {
        for (var i = 0; i < WISP_CANDIDATES.length; i++) {
          var url = WISP_CANDIDATES[i];
          var ok = await probeWisp(url, 3000);
          console.info('[agentiz] wisp probe', url, ok ? 'OK' : 'FAIL');
          if (ok) {
            if (window.__agentizWispUrl !== url) setTransport(url);
            window.__agentizWispReady = true;
            return;
          }
        }
        console.error('[agentiz] all wisp candidates failed — proxy will not work. ' +
          'Likely cause: network filter is blocking WebSocket connections to known wisp servers.');
        window.__agentizWispReady = false;
      })();
    })();
  </script>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
